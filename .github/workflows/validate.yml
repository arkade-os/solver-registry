name: Validate

# The reducer and its tests are load-bearing on the schemas, the client
# package sources (scripts/reduce.ts imports from packages/discovery-client),
# and the fixtures — validate on changes to any of them, not just cards.
on:
  pull_request:
    branches:
      - master
    paths:
      - solvers/**
      - schema/**
      - package.json
      - pnpm-lock.yaml
      - scripts/**
      - packages/**
      - tests/**
      - index.html
      - .github/workflows/validate.yml

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      # The reducer appends its per-card validation report to the job summary
      # via GITHUB_STEP_SUMMARY when that variable is set.
      - name: Validate cards and build indexes in-memory
        run: pnpm reduce --check
