name: Validate

on:
  pull_request:
    branches:
      - master
    paths:
      - solvers/**

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      # The reducer appends its per-card validation report to the job summary
      # via GITHUB_STEP_SUMMARY when that variable is set.
      - name: Validate cards and build indexes in-memory
        run: pnpm reduce --check
