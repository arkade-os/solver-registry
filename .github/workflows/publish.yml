name: Publish

# Republish when anything that shapes the published artifacts changes: the
# cards, the reducer (and the client sources it imports), the schemas, or the
# landing page.
on:
  push:
    branches:
      - master
    paths:
      - solvers/**
      - schema/**
      - package.json
      - pnpm-lock.yaml
      - scripts/**
      - packages/discovery-client/src/**
      - index.html
      - .github/workflows/publish.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      # The reducer appends its per-card validation report to the job summary
      # via GITHUB_STEP_SUMMARY when that variable is set.
      - name: Validate cards
        run: pnpm reduce --check

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build indexes
        run: |
          mkdir -p dist
          pnpm reduce --out=dist --commit=${{ github.sha }}
          cp index.html dist/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
